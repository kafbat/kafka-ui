name: "Infra: Feature Testing: Init env"

on:
  workflow_dispatch:

  pull_request:
    types: ['labeled']

permissions:
  contents: read
  packages: write
  statuses: write

jobs:
  build:
    if: ${{ github.event.label.name == 'status/feature_testing' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2 # https://github.com/actions/checkout/releases/tag/v4.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ github.token }}
      - name: get branch name
        id: extract_branch
        run: |
          tag='pr${{ github.event.pull_request.number }}'
          echo "tag=${tag}" >> $GITHUB_OUTPUT
      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # https://github.com/actions/setup-java/releases/tag/v4
        with:
          java-version-file: '.java-version'
          distribution: 'zulu'
          cache: 'gradle'
      - name: Build
        id: build
        run: |
          version=${GITHUB_SHA::7}
          echo "version=$version" >> $GITHUB_OUTPUT
          ./gradlew clean build \
            -x test \
            -Pinclude-frontend=true \
            -Pversion=$version
      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # https://github.com/docker/setup-qemu-action/releases/tag/v3.7.0
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # https://github.com/docker/setup-buildx-action/releases/tag/v3.11.1
      - name: Cache Docker layers
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # https://github.com/actions/cache/releases/tag/v4.3.0
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: Login to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # https://github.com/docker/login-action/releases/tag/v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: docker_build_and_push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # https://github.com/docker/build-push-action/releases/tag/v6.18.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/kafbat/kafka-ui-preview:${{ steps.extract_branch.outputs.tag }}
          build-args: |
            JAR_FILE=build/libs/api-${{ steps.build.outputs.version }}.jar
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
    outputs:
      tag: ${{ steps.extract_branch.outputs.tag }}
  make-branch-env:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: clone infra
        run: |
          git clone https://infra-tech:${{ secrets.INFRA_USER_ACCESS_TOKEN }}@github.com/kafbat/infra.git --branch envs
      - name: create deployment
        run: |
          cd infra/scripts
          echo "Branch:${{ needs.build.outputs.tag }}"
          bash pr-env-create.sh ${{ needs.build.outputs.tag }} ${{ needs.build.outputs.tag }}
          git config --global user.email "infra@kafbat.io"
          git config --global user.name "infra-tech"
          cd ../..
          git -C infra add -A
          git -C infra commit -m "deploy env: ${{ needs.build.outputs.tag }}" && git -C infra push || true

      - name: update status check
        uses: Sibz/github-status-action@650dd1a882a76dbbbc4576fb5974b8d22f29847f # https://github.com/Sibz/github-status-action/releases/tag/v1.1.6
        with:
          authToken: ${{secrets.GITHUB_TOKEN}}
          context: "Feature testing environment deployed (VPN required)"
          description: "kafka-ui-${{ needs.build.outputs.tag }}.kafka-ui.svc.cluster.local"
          state: "success"
          sha: ${{ github.event.pull_request.head.sha || github.sha }}
          target_url: "https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
