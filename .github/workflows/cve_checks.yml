name: "Infra: CVE checks"
on:
  pull_request:
    types: [ "opened", "reopened", "synchronize" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron: '0 8 15 * *'

permissions:
  contents: read

jobs:

  check-frontend-cves:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          token: ${{ github.token }}

      - name: Run frontend dependency CVE checks
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # https://github.com/aquasecurity/trivy-action/releases/tag/v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "frontend"
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "1"

  check-docker-cves:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          token: ${{ github.token }}

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # https://github.com/actions/setup-java/releases/tag/v4
        with:
          java-version-file: '.java-version'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Build project
        id: build
        run: |
          ./gradlew clean build \
          -x test \
          -Pbuild-docker-images=true \
          -Pinclude-frontend=true \
          -Pversion=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # https://github.com/docker/setup-qemu-action/releases/tag/v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # https://github.com/docker/setup-buildx-action/releases/tag/v3.11.1

      - name: Cache Docker layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # https://github.com/actions/cache/releases/tag/v4.3.0
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # https://github.com/docker/build-push-action/releases/tag/v6.18.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: api
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ghcr.io/kafbat/kafka-ui:latest
          build-args: |
            JAR_FILE=build/libs/api-latest.jar
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Run Docker image CVE checks
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # https://github.com/aquasecurity/trivy-action/releases/tag/v0.36.0
        with:
          image-ref: "ghcr.io/kafbat/kafka-ui:latest"
          severity: "CRITICAL,HIGH"
          format: "table"
          exit-code: "1"

  notify:
    needs: [ check-frontend-cves, check-docker-cves ]
    if: ${{ always() && (needs.check-frontend-cves.result == 'failure' || needs.check-docker-cves.result == 'failure') && github.event_name == 'schedule' }}
    uses: ./.github/workflows/infra_discord_hook.yml
    with:
      message: "Attention! CVE checks run failed! Please fix them CVEs :("
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL_CVE }}
